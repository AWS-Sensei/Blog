AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Contact form using SES

Parameters:
  HostedZoneId:
    Type: String
    Default: Z0003192F8JJC6RWXV1M

Globals:
  Function:
    Timeout: 10
    Runtime: python3.12
    MemorySize: 128

Resources:

  ContactApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: sensei-contact-api
      StageName: prod
      Cors:
        AllowOrigin: "'https://aws-sensei.cloud'"
        AllowMethods: "'POST, OPTIONS'"
        AllowHeaders: "'Content-Type'"
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: 1
          ThrottlingBurstLimit: 5

  ContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-contact
      Handler: handler.lambda_handler
      CodeUri: src/
      Environment:
        Variables:
          TO_EMAIL: marcel.baltzer@hotmail.de
          FROM_EMAIL: noreply@aws-sensei.cloud
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: ses:SendEmail
              Resource: "*"
      Events:
        ContactPost:
          Type: Api
          Properties:
            RestApiId: !Ref ContactApi
            Path: /contact
            Method: POST
        ContactOptions:
          Type: Api
          Properties:
            RestApiId: !Ref ContactApi
            Path: /contact
            Method: OPTIONS

  ContactCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: contact.aws-sensei.cloud
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: contact.aws-sensei.cloud
          HostedZoneId: !Ref HostedZoneId

  ContactCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: contact.aws-sensei.cloud
      RegionalCertificateArn: !Ref ContactCertificate
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  ContactBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn:
      - ContactCustomDomain
      - ContactApi
    Properties:
      DomainName: !Ref ContactCustomDomain
      RestApiId: !Ref ContactApi
      Stage: prod

  ContactDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: contact.aws-sensei.cloud
      Type: A
      AliasTarget:
        DNSName: !GetAtt ContactCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ContactCustomDomain.RegionalHostedZoneId

Outputs:
  ContactApiUrl:
    Description: Contact form API URL
    Value: https://contact.aws-sensei.cloud/contact
