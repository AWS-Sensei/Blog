version: 0.2

phases:
  build:
    commands:
      - |
        for template in apis/*/template.yaml; do
          [ -f "$template" ] || continue
          api_name="$(basename $(dirname $template))"
          stack_name="sensei-api-${api_name}"
          echo "Deploying $stack_name from $template..."
          sam deploy \
            --template-file $template \
            --stack-name $stack_name \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --s3-bucket $SAM_ARTIFACT_BUCKET \
            --kms-key-id alias/aws/s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --role-arn $CLOUDFORMATION_EXECUTION_ROLE_ARN \
            --tags "Project=aws-sensei" "Service=blog" "Component=api-${api_name}"
        done
