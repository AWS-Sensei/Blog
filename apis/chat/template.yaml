AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Real-time chat widget using WebSocket API Gateway + DynamoDB

Globals:
  Function:
    Timeout: 10
    Runtime: python3.12
    MemorySize: 128
    Environment:
      Variables:
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        MESSAGES_TABLE: !Ref MessagesTable

Resources:

  # ─── DynamoDB ───────────────────────────────────────────────────────────────

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sensei-chat-connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sensei-chat-messages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: postSlug
          AttributeType: S
        - AttributeName: sortKey
          AttributeType: S
      KeySchema:
        - AttributeName: postSlug
          KeyType: HASH
        - AttributeName: sortKey
          KeyType: RANGE

  # ─── WebSocket API ──────────────────────────────────────────────────────────

  ChatWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: sensei-chat-ws
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  ChatStage:
    Type: AWS::ApiGatewayV2::Stage
    DependsOn: [ConnectRoute, DisconnectRoute, DefaultRoute]
    Properties:
      ApiId: !Ref ChatWebSocketApi
      StageName: prod
      AutoDeploy: true

  # ─── Connect ────────────────────────────────────────────────────────────────

  ConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-chat-connect
      Handler: handler.lambda_handler
      CodeUri: src/connect/
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: [dynamodb:PutItem, dynamodb:Query]
              Resource:
                - !GetAtt ConnectionsTable.Arn
                - !GetAtt MessagesTable.Arn
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*"

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectFunction.Arn}/invocations"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatWebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub "integrations/${ConnectIntegration}"

  ConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*/*"

  # ─── Disconnect ─────────────────────────────────────────────────────────────

  DisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-chat-disconnect
      Handler: handler.lambda_handler
      CodeUri: src/disconnect/
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: dynamodb:DeleteItem
              Resource: !GetAtt ConnectionsTable.Arn

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DisconnectFunction.Arn}/invocations"

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatWebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub "integrations/${DisconnectIntegration}"

  DisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*/*"

  # ─── Message (Default) ──────────────────────────────────────────────────────

  MessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-chat-message
      Handler: handler.lambda_handler
      CodeUri: src/message/
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: [dynamodb:PutItem, dynamodb:Scan, dynamodb:DeleteItem]
              Resource: !GetAtt ConnectionsTable.Arn
            - Effect: Allow
              Action: [dynamodb:PutItem, dynamodb:Query]
              Resource: !GetAtt MessagesTable.Arn
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*"

  MessageIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MessageFunction.Arn}/invocations"

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatWebSocketApi
      RouteKey: $default
      AuthorizationType: NONE
      Target: !Sub "integrations/${MessageIntegration}"

  MessagePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref MessageFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*/*"

Outputs:
  ChatWebSocketUrl:
    Description: WebSocket URL
    Value: !Sub "wss://${ChatWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: sensei-chat-ws-url
