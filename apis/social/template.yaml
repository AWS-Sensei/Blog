AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Automatic LinkedIn post generation for new English blog articles

Parameters:
  HostedZoneId:
    Type: String
    Default: Z0003192F8JJC6RWXV1M
  PostChangedTopicArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /sensei/blog/post-changed-topic-arn
  WebsiteBucketName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /sensei/blog/bucket-name

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 256

Resources:

  # ─── DynamoDB ────────────────────────────────────────────────────────────────

  SocialPostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sensei-social-posts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: postId
          AttributeType: S
      KeySchema:
        - AttributeName: postId
          KeyType: HASH
      Tags:
        - Key: Project
          Value: aws-sensei
        - Key: Service
          Value: blog
        - Key: Component
          Value: api-social

  # ─── Dead Letter Queue ───────────────────────────────────────────────────────

  OrchestratorDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: sensei-social-orchestrator-dlq
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Project
          Value: aws-sensei
        - Key: Service
          Value: blog
        - Key: Component
          Value: api-social

  # ─── Lambda: Orchestrator ────────────────────────────────────────────────────

  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-social-orchestrator
      Handler: handler.lambda_handler
      CodeUri: src/orchestrator/
      Timeout: 60
      Environment:
        Variables:
          TABLE_NAME: !Ref SocialPostsTable
          FROM_EMAIL: noreply@aws-sensei.cloud
          TO_EMAIL: marcel.baltzer@hotmail.de
          APPROVE_URL: https://social.aws-sensei.cloud/approve
          RETRY_URL: https://social.aws-sensei.cloud/retry
          BEDROCK_MODEL_ID: eu.anthropic.claude-haiku-4-5-20251001-v1:0
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref SocialPostsTable
        - Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource: !Sub "arn:aws:s3:::${WebsiteBucketName}/_content/posts/*"
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
            - Effect: Allow
              Action:
                - aws-marketplace:ViewSubscriptions
                - aws-marketplace:Subscribe
              Resource: "*"
            - Effect: Allow
              Action: ses:SendEmail
              Resource: "*"
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt OrchestratorDLQ.Arn
      Events:
        NewPost:
          Type: SNS
          Properties:
            Topic: !Ref PostChangedTopicArn
      Tags:
        Project: aws-sensei
        Service: blog
        Component: api-social

  # ─── Lambda: Retrier ─────────────────────────────────────────────────────────

  RetrierFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-social-retrier
      Handler: handler.lambda_handler
      CodeUri: src/retrier/
      Timeout: 15
      Environment:
        Variables:
          TABLE_NAME: !Ref SocialPostsTable
          ORCHESTRATOR_FUNCTION_NAME: !Ref OrchestratorFunction
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SocialPostsTable
        - DynamoDBWritePolicy:
            TableName: !Ref SocialPostsTable
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt OrchestratorFunction.Arn
      Events:
        RetryGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApproveApi
            Path: /retry
            Method: GET
      Tags:
        Project: aws-sensei
        Service: blog
        Component: api-social

  # ─── Lambda: Approver ────────────────────────────────────────────────────────

  ApproverFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-social-approver
      Handler: handler.lambda_handler
      CodeUri: src/approver/
      Timeout: 15
      Environment:
        Variables:
          TABLE_NAME: !Ref SocialPostsTable
          LINKEDIN_SECRET_NAME: sensei/linkedin/oauth
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SocialPostsTable
        - DynamoDBWritePolicy:
            TableName: !Ref SocialPostsTable
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:sensei/linkedin/oauth*"
      Events:
        ApproveGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApproveApi
            Path: /approve
            Method: GET
      Tags:
        Project: aws-sensei
        Service: blog
        Component: api-social

  # ─── Lambda: LinkedIn Re-Auth ────────────────────────────────────────────────

  LinkedInReauthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-social-linkedin-reauth
      Handler: handler.lambda_handler
      CodeUri: src/reauth/
      Timeout: 10
      Environment:
        Variables:
          LINKEDIN_SECRET_NAME: sensei/linkedin/oauth
          REDIRECT_URI: https://social.aws-sensei.cloud/linkedin/callback
      Policies:
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:sensei/linkedin/oauth*"
      Events:
        ReauthGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApproveApi
            Path: /linkedin/reauth
            Method: GET
      Tags:
        Project: aws-sensei
        Service: blog
        Component: api-social

  # ─── Lambda: LinkedIn Callback ───────────────────────────────────────────────

  LinkedInCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-social-linkedin-callback
      Handler: handler.lambda_handler
      CodeUri: src/callback/
      Timeout: 15
      Environment:
        Variables:
          LINKEDIN_SECRET_NAME: sensei/linkedin/oauth
          REDIRECT_URI: https://social.aws-sensei.cloud/linkedin/callback
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
                - secretsmanager:PutSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:sensei/linkedin/oauth*"
      Events:
        CallbackGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApproveApi
            Path: /linkedin/callback
            Method: GET
      Tags:
        Project: aws-sensei
        Service: blog
        Component: api-social

  # ─── Lambda: Token Expiry Checker ────────────────────────────────────────────

  ExpiryCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-social-expiry-checker
      Handler: handler.lambda_handler
      CodeUri: src/expiry_checker/
      Timeout: 15
      Environment:
        Variables:
          LINKEDIN_SECRET_NAME: sensei/linkedin/oauth
          FROM_EMAIL: noreply@aws-sensei.cloud
          TO_EMAIL: marcel.baltzer@hotmail.de
          REAUTH_URL: https://social.aws-sensei.cloud/linkedin/reauth
      Policies:
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:sensei/linkedin/oauth*"
            - Effect: Allow
              Action: ses:SendEmail
              Resource: "*"
      Events:
        WeeklyCheck:
          Type: Schedule
          Properties:
            Schedule: cron(0 8 ? * MON *)
            Description: Weekly LinkedIn token expiry check
      Tags:
        Project: aws-sensei
        Service: blog
        Component: api-social

  # ─── HTTP API ────────────────────────────────────────────────────────────────

  ApproveApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: sensei-social-api
      StageName: prod
      DisableExecuteApiEndpoint: true

  # ─── Custom Domain (social.aws-sensei.cloud) ─────────────────────────────────

  SocialCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: social.aws-sensei.cloud
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: social.aws-sensei.cloud
          HostedZoneId: !Ref HostedZoneId

  SocialCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: social.aws-sensei.cloud
      DomainNameConfigurations:
        - CertificateArn: !Ref SocialCertificate
          EndpointType: REGIONAL

  SocialApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    DependsOn:
      - SocialCustomDomain
      - ApproveApi
    Properties:
      ApiId: !Ref ApproveApi
      DomainName: social.aws-sensei.cloud
      Stage: prod

  SocialDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: social.aws-sensei.cloud
      Type: A
      AliasTarget:
        DNSName: !GetAtt SocialCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt SocialCustomDomain.RegionalHostedZoneId

Outputs:
  ApproveUrl:
    Description: Approval endpoint URL
    Value: https://social.aws-sensei.cloud/approve
  OrchestratorDLQUrl:
    Description: Orchestrator Dead Letter Queue URL
    Value: !Ref OrchestratorDLQ
  OrchestratorDLQArn:
    Description: Orchestrator Dead Letter Queue ARN
    Value: !GetAtt OrchestratorDLQ.Arn
