AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Cost Dashboard API — reads AWS Cost Explorer data cached in SSM

Parameters:
  HostedZoneId:
    Type: String
    Default: Z0003192F8JJC6RWXV1M

Globals:
  Function:
    Timeout: 15
    Runtime: python3.12
    MemorySize: 128

Resources:

  CostApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: sensei-cost-api
      StageName: prod
      DisableExecuteApiEndpoint: true
      Cors:
        AllowMethods: "'GET, OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'https://aws-sensei.cloud'"
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: 2
          ThrottlingBurstLimit: 5

  CostReadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-cost-read
      Handler: handler.lambda_handler
      CodeUri: src/read/
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/sensei/blog/cost-data"
      Events:
        CostGet:
          Type: Api
          Properties:
            RestApiId: !Ref CostApi
            Path: /cost
            Method: GET
        CostOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CostApi
            Path: /cost
            Method: OPTIONS

  CostRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-cost-refresh
      Handler: handler.lambda_handler
      CodeUri: src/refresh/
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ce:GetCostAndUsage
              Resource: "*"
            - Effect: Allow
              Action:
                - ssm:PutParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/sensei/blog/cost-data"
      Events:
        DailyRefresh:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Name: sensei-cost-refresh-daily

  CostCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: cost.aws-sensei.cloud
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: cost.aws-sensei.cloud
          HostedZoneId: !Ref HostedZoneId

  CostCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: cost.aws-sensei.cloud
      RegionalCertificateArn: !Ref CostCertificate
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  CostBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn:
      - CostCustomDomain
      - CostApi
    Properties:
      DomainName: !Ref CostCustomDomain
      RestApiId: !Ref CostApi
      Stage: prod

  CostDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: cost.aws-sensei.cloud
      Type: A
      AliasTarget:
        DNSName: !GetAtt CostCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt CostCustomDomain.RegionalHostedZoneId

Outputs:
  CostApiUrl:
    Description: Cost API endpoint URL
    Value: https://cost.aws-sensei.cloud/cost
    Export:
      Name: sensei-cost-api-url
