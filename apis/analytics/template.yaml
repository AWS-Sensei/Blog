AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Privacy-first analytics — API Gateway → Lambda → Firehose → S3 + Athena

Parameters:
  HostedZoneId:
    Type: String
    Default: Z0003192F8JJC6RWXV1M

Globals:
  Function:
    Timeout: 10
    Runtime: python3.12
    MemorySize: 128

Resources:

  # ─── S3 (data lake) ─────────────────────────────────────────────────────────

  AnalyticsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "aws-sensei-analytics-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-after-one-year
            Status: Enabled
            ExpirationInDays: 365
      Tags:
        - Key: Project
          Value: aws-sensei
        - Key: Service
          Value: blog
        - Key: Component
          Value: analytics

  # ─── Kinesis Firehose ────────────────────────────────────────────────────────

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: s3-write
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt AnalyticsBucket.Arn
                  - !Sub "${AnalyticsBucket.Arn}/*"

  AnalyticsDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: sensei-analytics
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt AnalyticsBucket.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
        Prefix: "events/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/"
        ErrorOutputPrefix: "errors/!{firehose:error-output-type}/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/"
        BufferingHints:
          IntervalInSeconds: 60
          SizeInMBs: 5
        CompressionFormat: GZIP

  # ─── Lambda ──────────────────────────────────────────────────────────────────

  TrackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-analytics-track
      Handler: handler.lambda_handler
      CodeUri: src/track/
      Environment:
        Variables:
          FIREHOSE_STREAM: !Ref AnalyticsDeliveryStream
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: firehose:PutRecord
              Resource: !GetAtt AnalyticsDeliveryStream.Arn
      Events:
        Track:
          Type: HttpApi
          Properties:
            ApiId: !Ref AnalyticsApi
            Path: /track
            Method: POST
      Tags:
        Project: aws-sensei
        Service: blog
        Component: analytics

  DashboardRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-analytics-dashboard-refresh
      Handler: handler.lambda_handler
      CodeUri: src/dashboard_refresh/
      Timeout: 120
      Environment:
        Variables:
          ATHENA_WORKGROUP: !Ref AnalyticsWorkGroup
          CACHE_BUCKET: !Ref AnalyticsBucket
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - athena:StartQueryExecution
                - athena:GetQueryExecution
                - athena:GetQueryResults
                - athena:StopQueryExecution
              Resource: !Sub "arn:aws:athena:${AWS::Region}:${AWS::AccountId}:workgroup/${AnalyticsWorkGroup}"
            - Effect: Allow
              Action:
                - glue:GetTable
                - glue:GetDatabase
                - glue:GetPartitions
              Resource: "*"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:GetBucketLocation
                - s3:ListBucket
              Resource:
                - !GetAtt AnalyticsBucket.Arn
                - !Sub "${AnalyticsBucket.Arn}/*"
      Events:
        HourlyRefresh:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
      Tags:
        Project: aws-sensei
        Service: blog
        Component: analytics

  DashboardServeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sensei-analytics-dashboard-serve
      Handler: handler.lambda_handler
      CodeUri: src/dashboard_serve/
      Environment:
        Variables:
          CACHE_BUCKET: !Ref AnalyticsBucket
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource: !Sub "${AnalyticsBucket.Arn}/cache/*"
      Events:
        Dashboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref AnalyticsApi
            Path: /dashboard
            Method: GET
      Tags:
        Project: aws-sensei
        Service: blog
        Component: analytics

  # ─── HTTP API ────────────────────────────────────────────────────────────────

  AnalyticsApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: sensei-analytics-api
      StageName: prod
      DisableExecuteApiEndpoint: true

  # ─── Custom Domain (analytics.aws-sensei.cloud) ──────────────────────────────

  AnalyticsCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: analytics.aws-sensei.cloud
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: analytics.aws-sensei.cloud
          HostedZoneId: !Ref HostedZoneId

  AnalyticsCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: analytics.aws-sensei.cloud
      DomainNameConfigurations:
        - CertificateArn: !Ref AnalyticsCertificate
          EndpointType: REGIONAL

  AnalyticsApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    DependsOn: AnalyticsCustomDomain
    Properties:
      ApiId: !Ref AnalyticsApi
      DomainName: analytics.aws-sensei.cloud
      Stage: prod

  AnalyticsDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: analytics.aws-sensei.cloud
      Type: A
      AliasTarget:
        DNSName: !GetAtt AnalyticsCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt AnalyticsCustomDomain.RegionalHostedZoneId

  # ─── Glue + Athena ───────────────────────────────────────────────────────────

  AnalyticsGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: sensei_analytics
        Description: Analytics events from aws-sensei.cloud

  AnalyticsGlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref AnalyticsGlueDatabase
      TableInput:
        Name: page_views
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: json
          compressionType: gzip
          typeOfData: file
          "projection.enabled": "true"
          "projection.year.type": integer
          "projection.year.range": "2026,2035"
          "projection.month.type": integer
          "projection.month.range": "1,12"
          "projection.month.digits": "2"
          "projection.day.type": integer
          "projection.day.range": "1,31"
          "projection.day.digits": "2"
          "storage.location.template": !Sub "s3://${AnalyticsBucket}/events/year=${!year}/month=${!month}/day=${!day}/"
        PartitionKeys:
          - Name: year
            Type: string
          - Name: month
            Type: string
          - Name: day
            Type: string
        StorageDescriptor:
          Location: !Sub "s3://${AnalyticsBucket}/events/"
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          Compressed: true
          SerdeInfo:
            SerializationLibrary: org.apache.hive.hcatalog.data.JsonSerDe
            Parameters:
              serialization.format: "1"
          Columns:
            - Name: timestamp
              Type: string
            - Name: event
              Type: string
            - Name: page
              Type: string
            - Name: lang
              Type: string
            - Name: referrer_domain
              Type: string
            - Name: browser
              Type: string
            - Name: screen_width
              Type: int
            - Name: session_id
              Type: string

  AnalyticsWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: sensei-analytics
      WorkGroupConfiguration:
        ResultConfiguration:
          OutputLocation: !Sub "s3://${AnalyticsBucket}/athena-results/"
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: false
      Tags:
        - Key: Project
          Value: aws-sensei
        - Key: Component
          Value: analytics

Outputs:
  AnalyticsEndpoint:
    Description: Analytics endpoint URL
    Value: https://analytics.aws-sensei.cloud/track
    Export:
      Name: sensei-analytics-endpoint

  AnalyticsBucketName:
    Description: S3 bucket for analytics data
    Value: !Ref AnalyticsBucket
    Export:
      Name: sensei-analytics-bucket

  AthenaWorkGroup:
    Description: Athena WorkGroup name
    Value: !Ref AnalyticsWorkGroup
    Export:
      Name: sensei-analytics-workgroup
