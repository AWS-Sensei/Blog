version: 0.2

env:
  variables:
    HUGO_VERSION: "0.124.1"

phases:
  install:
    commands:
      - echo "Installing Hugo $HUGO_VERSION..."
      - curl -L https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz -o hugo.tar.gz
      - tar -xzf hugo.tar.gz
      - mv hugo /usr/local/bin/
  build:
    commands:
      - echo "Build Hugo Website..."
      - cd frontend
      - npm ci --omit=dev
      - echo "Generating OG images..."
      - node scripts/generate-og.mjs
      - hugo --minify
  post_build:
    commands:
      - echo "Deploying to $WEBSITE_BUCKET..."
      - aws s3 sync public/ s3://$WEBSITE_BUCKET --delete --exclude "audio/*" --exclude "_content/*"
      - echo "Generating hash-based trigger files for changed posts..."
      - mkdir -p /tmp/post-triggers
      - |
        find content/posts -name "*.md" | while read md_file; do
          slug=$(echo "$md_file" | cut -d'/' -f3)
          lang=$(basename "$md_file" | cut -d'.' -f2)
          hash=$(md5sum "$md_file" | cut -d' ' -f1)
          mkdir -p "/tmp/post-triggers/$slug"
          cp "$md_file" "/tmp/post-triggers/$slug/index.$lang.$hash"
        done
      - aws s3 sync /tmp/post-triggers/ s3://$WEBSITE_BUCKET/_content/posts/ --size-only --delete
      - echo "Invalidating CloudFront cache..."
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
